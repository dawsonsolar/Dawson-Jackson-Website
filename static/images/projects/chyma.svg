<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#7b2fff" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Decorative clock/hourglass shape -->
  <g transform="translate(400,225)">
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#7b2fff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="0" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="10" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#00d4ff"/>
  </g>
  <!-- Glow -->
  <circle cx="400" cy="225" r="120" fill="none" stroke="#7b2fff" stroke-width="40" opacity="0.05"/>
  <!-- Title text -->
  <text x="400" y="390" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="url(#accent)" letter-spacing="3">CHYMA AND THE TOLL OF TIME</text>
  <text x="400" y="415" text-anchor="middle" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.7" letter-spacing="2">UNITY · C# · CHAMPLAIN COLLEGE</text>
</svg>
