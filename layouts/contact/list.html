{{ define "main" }}
<div class="post-overlay active">
  <div class="post-overlay-backdrop"></div>
  <div class="post-overlay-content" style="position: relative; min-height: 100vh; padding: 0; transform: translateY(0);">
    <div class="post-overlay-header">
      <div class="post-overlay-title">
        <a href="{{ "/" | absLangURL }}" class="overlay-site-title">{{ .Site.Title }}</a>
      </div>
    </div>
    <div class="post-layout">
      <article class="post-content">
        <header class="post-header">
          <h1 class="post-title">{{ .Title }}</h1>
        </header>
        <div class="post-body">
          {{ .Content }}
        </div>

        <!-- Social quick-links -->
        <div class="contact-social-row" style="display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap;">
          {{ with .Site.Params.Social.github }}
          <a href="{{ . }}" target="_blank" rel="noopener" class="continue-reading-vaporwave" style="display:inline-flex;align-items:center;gap:0.4rem;">
            <i class="fab fa-github"></i> GitHub
          </a>
          {{ end }}
          {{ with .Site.Params.Social.linkedin }}
          <a href="{{ . }}" target="_blank" rel="noopener" class="continue-reading-vaporwave" style="display:inline-flex;align-items:center;gap:0.4rem;">
            <i class="fab fa-linkedin"></i> LinkedIn
          </a>
          {{ end }}
          {{ with .Site.Params.Social.email }}
          <a href="mailto:{{ . }}" class="continue-reading-vaporwave" style="display:inline-flex;align-items:center;gap:0.4rem;">
            <i class="fas fa-envelope"></i> Email
          </a>
          {{ end }}
        </div>
      </article>
    </div>
  </div>
</div>
{{ end }}
