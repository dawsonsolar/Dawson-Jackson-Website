{{ define "main" }}
<div class="post-overlay active">
  <div class="post-overlay-backdrop"></div>
  <div class="post-overlay-content" style="position: relative; min-height: 100vh; padding: 0; transform: translateY(0);">
    <div class="post-overlay-header">
      <div class="post-overlay-title">
        <a href="{{ .Site.BaseURL }}" class="overlay-site-title">{{ .Site.Title }}</a>
      </div>
    </div>
    <div class="post-layout">
      <article class="post-content">
        <header class="post-header">
          <h1 class="post-title">{{ .Title }}</h1>
        </header>
        <div class="post-body about-body">
          {{ .Content }}
        </div>
        <!-- CTA buttons -->
        <div style="display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap;">
          <a href="/Dawson-Jackson-Website/projects/" class="continue-reading-vaporwave">View Projects →</a>
          <a href="/Dawson-Jackson-Website/contact/" class="continue-reading-vaporwave">Get In Touch →</a>
        </div>
      </article>
    </div>
  </div>
</div>
{{ end }}
